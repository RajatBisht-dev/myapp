name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 13.233.107.138
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user
            sudo rm -rf myapp
            git clone https://github.com/RajatBisht-dev/myapp.git
            cd myapp
            sudo docker build --no-cache -t myapp .
            sudo docker stop myapp || true
            sudo docker rm myapp || true
            sudo docker run -d -p 80:80 --name myapp myapp


        